<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Tarefas Inteligente</title>
    <link rel="stylesheet" href="trabalho.css">
</head>
<body>
    <div class="container"> 
        <h1>Lista de Tarefas Inteligente</h1>
        <div class="input-area">
            <input type="text" id="tarefaInput" placeholder="Digite sua tarefa...">
            <button id="btnAdicionar">Adicionar Tarefa</button>
        </div>
    
        <div class="filtros">
            <button id="filtroTodas">Todas</button>
            <button id="filtroPendentes">Pendentes</button>
            <button id="filtroConcluidas">Concluídas</button>    
         </div>
    <ul id="listaTarefas"></ul>

</div>
<script src="trabalho.js"></script>
</body>
</html>
